name: Deploy to Railway

# Railway auto-deploys on push via GitHub integration.
# This workflow is available for manual deploys if needed.
on:
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  RAILWAY_PROJECT_ID: cbeb0da9-5d9e-4ea9-ad18-90235e4f7be9

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: cbeb0da9-5d9e-4ea9-ad18-90235e4f7be9

      # Setup:
      # 1. Railway dashboard → Project Settings → Tokens → Generate Token
      # 2. GitHub repo → Settings → Secrets → Add RAILWAY_TOKEN with the project token
