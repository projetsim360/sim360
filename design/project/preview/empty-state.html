<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:#FAFAF9; font-family:Inter,sans-serif; }
  .state { background:#fff; border:1px solid #E7E5E4; border-radius:8px; padding:28px; text-align:center; }
  .illus { width:160px; height:120px; margin:0 auto 16px; }
  h4 { font-family:Montserrat; font-weight:700; font-size:18px; color:#1A2B48; margin:0 0 6px; }
  p { font-size:13px; color:#57534E; margin:0 0 16px; max-width:380px; margin-left:auto; margin-right:auto; line-height:1.5; }
  .cta { display:inline-flex; align-items:center; gap:8px; background:#EE7A3A; color:#fff; font-weight:600; font-size:14px; padding:0 16px; height:40px; border-radius:8px; border:0; cursor:pointer; }
</style></head>
<body>
<div class="state">
  <img class="illus" src="../assets/empty-state-simulation.svg" alt="" />
  <h4>Lancez votre première simulation</h4>
  <p>Choisissez un scénario, composez votre équipe IA, prenez vos premières décisions.</p>
  <button class="cta">Lancer la simulation</button>
</div>
</body></html>
