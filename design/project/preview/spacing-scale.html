<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:#FAFAF9; font-family:Inter,sans-serif; }
  .row { display:flex; align-items:center; gap:16px; padding:6px 0; border-bottom:1px solid #E7E5E4; }
  .row:last-child { border-bottom:none; }
  .token { font-family:ui-monospace,monospace; font-size:12px; color:#1A2B48; font-weight:600; width:90px; flex-shrink:0; }
  .px { font-size:11px; color:#78716C; width:50px; flex-shrink:0; text-align:right; }
  .bar { height:14px; background:#EE7A3A; border-radius:3px; }
</style></head>
<body>
  <div class="row"><div class="token">space-0.5</div><div class="px">2 px</div><div class="bar" style="width:2px"></div></div>
  <div class="row"><div class="token">space-1</div><div class="px">4 px</div><div class="bar" style="width:4px"></div></div>
  <div class="row"><div class="token">space-2</div><div class="px">8 px</div><div class="bar" style="width:8px"></div></div>
  <div class="row"><div class="token">space-3</div><div class="px">12 px</div><div class="bar" style="width:12px"></div></div>
  <div class="row"><div class="token">space-4 ★</div><div class="px">16 px</div><div class="bar" style="width:16px"></div></div>
  <div class="row"><div class="token">space-5</div><div class="px">20 px</div><div class="bar" style="width:20px"></div></div>
  <div class="row"><div class="token">space-6</div><div class="px">24 px</div><div class="bar" style="width:24px"></div></div>
  <div class="row"><div class="token">space-8</div><div class="px">32 px</div><div class="bar" style="width:32px"></div></div>
  <div class="row"><div class="token">space-10</div><div class="px">40 px</div><div class="bar" style="width:40px"></div></div>
  <div class="row"><div class="token">space-12</div><div class="px">48 px</div><div class="bar" style="width:48px"></div></div>
  <div class="row"><div class="token">space-16</div><div class="px">64 px</div><div class="bar" style="width:64px"></div></div>
  <div class="row"><div class="token">space-24</div><div class="px">96 px</div><div class="bar" style="width:96px"></div></div>
</body></html>
