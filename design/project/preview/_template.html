<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: #FAFAF9; padding: 24px; box-sizing: border-box; }
  * { box-sizing: border-box; }
  .card-wrap { max-width: 652px; }
  .grid { display: grid; gap: 12px; }
  .row { display: flex; gap: 12px; align-items: center; }
  .swatch { height: 64px; border-radius: 8px; border: 1px solid rgba(15,26,46,.06); display: flex; flex-direction: column; justify-content: space-between; padding: 8px 10px; color: #fff; }
  .swatch .v { font-family: var(--font-body); font-weight: 600; font-size: 11px; letter-spacing: .02em; opacity: .9; }
  .swatch .n { font-family: var(--font-body); font-weight: 600; font-size: 11px; opacity: .75; }
  .swatch.dark-text { color: #1A2B48; }
  .overline-mini { font-family: var(--font-body); font-weight: 600; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: #78716C; }
  .sep { height: 1px; background: #E7E5E4; margin: 8px 0; }
</style>
</head>
