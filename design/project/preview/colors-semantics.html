<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:#FAFAF9; font-family:'Inter',sans-serif; }
  .row { display:grid; grid-template-columns:70px repeat(5,1fr); gap:4px; margin-bottom:6px; align-items:center; }
  .sw { height:42px; border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:600; border:1px solid rgba(15,26,46,.05); }
  .name { font-size:12px; font-weight:700; color:#1A2B48; }
  .head { display:grid; grid-template-columns:70px repeat(5,1fr); gap:4px; margin-bottom:6px; font-size:10px; color:#78716C; font-weight:600; letter-spacing:.5px; text-transform:uppercase; }
  .head div { text-align:center; }
</style></head>
<body>
<div class="head"><div></div><div>50</div><div>200</div><div>500</div><div>700</div><div>900</div></div>
<div class="row">
  <div class="name">Success</div>
  <div class="sw" style="background:#ECFDF5;color:#064E3B">#ECFDF5</div>
  <div class="sw" style="background:#A7F3D0;color:#064E3B">#A7F3D0</div>
  <div class="sw" style="background:#10B981;color:#fff">#10B981 ★</div>
  <div class="sw" style="background:#047857;color:#fff">#047857</div>
  <div class="sw" style="background:#064E3B;color:#fff">#064E3B</div>
</div>
<div class="row">
  <div class="name">Warning</div>
  <div class="sw" style="background:#FFFBEB;color:#78350F">#FFFBEB</div>
  <div class="sw" style="background:#FCD34D;color:#78350F">#FCD34D</div>
  <div class="sw" style="background:#F59E0B;color:#fff">#F59E0B ★</div>
  <div class="sw" style="background:#B45309;color:#fff">#B45309</div>
  <div class="sw" style="background:#78350F;color:#fff">#78350F</div>
</div>
<div class="row">
  <div class="name">Error</div>
  <div class="sw" style="background:#FEF2F2;color:#7F1D1D">#FEF2F2</div>
  <div class="sw" style="background:#FCA5A5;color:#7F1D1D">#FCA5A5</div>
  <div class="sw" style="background:#EF4444;color:#fff">#EF4444 ★</div>
  <div class="sw" style="background:#B91C1C;color:#fff">#B91C1C</div>
  <div class="sw" style="background:#7F1D1D;color:#fff">#7F1D1D</div>
</div>
<div class="row">
  <div class="name">Info</div>
  <div class="sw" style="background:#EFF6FF;color:#1E3A8A">#EFF6FF</div>
  <div class="sw" style="background:#93C5FD;color:#1E3A8A">#93C5FD</div>
  <div class="sw" style="background:#3B82F6;color:#fff">#3B82F6 ★</div>
  <div class="sw" style="background:#1D4ED8;color:#fff">#1D4ED8</div>
  <div class="sw" style="background:#1E3A8A;color:#fff">#1E3A8A</div>
</div>
</body></html>
