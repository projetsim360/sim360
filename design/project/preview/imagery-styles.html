<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:16px 24px 24px; background:#FAFAF9; font-family:Inter,sans-serif; }
  .grid { display:grid; grid-template-columns: 1fr 1fr 1fr; gap:12px; }
  .cell { border-radius:8px; overflow:hidden; aspect-ratio: 4/3; position:relative; background:#1A2B48; }
  .cell img { width:100%; height:100%; object-fit:cover; display:block; }
  .tag { position:absolute; top:10px; left:10px; background:rgba(255,255,255,.95); padding:3px 8px; border-radius:4px; font-size:10px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; color:#1A2B48; }
  .B { background:#fff; display:flex; align-items:center; justify-content:center; border:1px solid #E7E5E4; }
  .B img { width:70%; height:auto; }
  .C { background:linear-gradient(135deg,#1A2B48 0%,#0F1A2E 100%); display:flex; align-items:flex-end; padding:14px; color:#fff; }
  .C .q { font-family:Montserrat; font-weight:700; font-size:13px; line-height:1.35; }
  .C .who { font-size:11px; opacity:.7; margin-top:6px; }
  .C::after { content:''; position:absolute; top:20px; right:20px; width:32px; height:32px; border-radius:99px; background:#EE7A3A; }
</style></head>
<body>
<div class="grid">
  <div class="cell"><span class="tag">A · Géométrique</span><img src="../assets/hero-geometric.svg" /></div>
  <div class="cell B"><span class="tag">B · Illustration</span><img src="../assets/empty-state-simulation.svg" /></div>
  <div class="cell C"><span class="tag">C · Photo + overlay</span>
    <div><div class="q">« On mesure le leadership, pas le CV. »</div><div class="who">Directrice RH, cabinet Fellows</div></div>
  </div>
</div>
<div style="font-size:11px;color:#78716C;margin-top:10px;line-height:1.5">
  <b style="color:#1A2B48">Règle d'or :</b> un seul style par écran. A = hero/data-viz, B = empty state/onboarding, C = témoignages/cas clients.
</div>
</body></html>
