<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:#FAFAF9; }
  .grid { display:grid; grid-template-columns: repeat(11, 1fr); gap:4px; max-width:652px; }
  .sw { aspect-ratio: 1/1.1; border-radius:6px; display:flex; flex-direction:column; justify-content:flex-end; padding:6px; font-family:'Inter',sans-serif; font-size:9px; font-weight:600; border:1px solid rgba(15,26,46,.05); }
  .sw .n { opacity:.75; font-weight:500; }
  .sw-wrap { position:relative; }
  .star { position:absolute; top:4px; right:6px; color:#EE7A3A; font-size:11px; }
  .label { font-family:'Inter',sans-serif; font-size:12px; font-weight:600; color:#1A2B48; margin-bottom:10px; letter-spacing:.02em; }
  .hint { font-family:'Inter',sans-serif; font-size:11px; color:#78716C; margin-top:10px; }
</style></head>
<body>
<div class="label">NEUTRALS — Warm Gray</div>
<div class="grid">
  <div class="sw-wrap"><div class="sw" style="background:#FAFAF9; color:#0C0A09">0<div class="n">#FAFAF9</div></div></div>
  <div class="sw-wrap"><div class="sw" style="background:#F5F5F4; color:#0C0A09">50<div class="n">#F5F5F4</div></div></div>
  <div class="sw-wrap"><div class="sw" style="background:#E7E5E4; color:#0C0A09">100<div class="n">#E7E5E4</div></div></div>
  <div class="sw-wrap"><div class="sw" style="background:#D6D3D1; color:#0C0A09">200<div class="n">#D6D3D1</div></div></div>
  <div class="sw-wrap"><div class="sw" style="background:#A8A29E; color:#0C0A09">300<div class="n">#A8A29E</div></div></div>
  <div class="sw-wrap"><div class="sw" style="background:#78716C; color:#fff">400<div class="n">#78716C</div></div></div>
  <div class="sw-wrap"><div class="sw" style="background:#57534E; color:#fff">500<div class="n">#57534E</div></div></div>
  <div class="sw-wrap"><div class="sw" style="background:#44403C; color:#fff">600<div class="n">#44403C</div></div></div>
  <div class="sw-wrap"><span class="star">★</span><div class="sw" style="background:#292524; color:#fff">700<div class="n">#292524</div></div></div>
  <div class="sw-wrap"><div class="sw" style="background:#1C1917; color:#fff">800<div class="n">#1C1917</div></div></div>
  <div class="sw-wrap"><div class="sw" style="background:#0C0A09; color:#fff">900<div class="n">#0C0A09</div></div></div>
</div>
<div class="hint">Teinte chaude choisie pour s'harmoniser avec l'accent orange. <b>Jamais</b> <code style="font-family:ui-monospace;background:#F5F5F4;padding:1px 4px;border-radius:3px">#000</code> pur — utiliser neutral-900.</div>
</body></html>
