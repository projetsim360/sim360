<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:#FAFAF9; font-family:Inter,sans-serif; }
  .grid { display:grid; grid-template-columns: 1fr 1fr; gap:14px; }
  .cell { padding:16px; border-radius:8px; }
  .light { background:#fff; box-shadow:0 2px 4px rgba(15,26,46,.06), 0 4px 12px rgba(15,26,46,.08); }
  .dark { background:#1A2B48; }
  .reverse-dark { background:#0F1A2E; }
  .mono { background:#F5F5F4; border:1px solid #E7E5E4; }
  .favicon-cell { background:#fff; border:1px solid #E7E5E4; display:flex; align-items:center; justify-content:center; gap:18px; padding:24px; }
  img.wordmark { height:42px; display:block; }
  .tag { font-size:10px; font-weight:600; letter-spacing:1px; text-transform:uppercase; margin-bottom:12px; }
  .t-dark { color:#78716C; }
  .t-light { color:#A8B9D4; }
</style></head>
<body>
<div class="grid">
  <div class="cell light">
    <div class="tag t-dark">Standard · bicolor</div>
    <img class="wordmark" src="../assets/logo-pragma360-wordmark.svg" />
  </div>
  <div class="cell dark">
    <div class="tag t-light">Reverse · sur fond sombre</div>
    <img class="wordmark" src="../assets/logo-pragma360-wordmark-reverse.svg" />
  </div>
  <div class="cell mono">
    <div class="tag t-dark">Mono · brand-700</div>
    <img class="wordmark" src="../assets/logo-pragma360-mono-dark.svg" />
  </div>
  <div class="cell reverse-dark">
    <div class="tag t-light">Mono · white</div>
    <img class="wordmark" src="../assets/logo-pragma360-mono-light.svg" />
  </div>
</div>
<div class="favicon-cell" style="margin-top:12px">
  <img src="../assets/favicon.svg" width="32" height="32" />
  <img src="../assets/favicon.svg" width="48" height="48" />
  <img src="../assets/favicon.svg" width="72" height="72" />
  <div style="font-size:12px;color:#78716C;margin-left:auto">Favicon · 16 → 512 px</div>
</div>
</body></html>
