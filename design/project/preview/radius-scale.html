<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:#FAFAF9; font-family:Inter,sans-serif; }
  .grid { display:grid; grid-template-columns: repeat(5,1fr); gap:12px; }
  .cell { background:#fff; border:1px solid #E7E5E4; padding:16px 12px; text-align:center; }
  .box { height:56px; background:#1A2B48; margin:0 auto 10px; max-width:80px; }
  .name { font-size:11px; font-weight:700; color:#1A2B48; letter-spacing:.3px; text-transform:uppercase; }
  .val { font-size:11px; color:#78716C; margin-top:2px; font-family:ui-monospace,monospace; }
</style></head>
<body>
<div class="grid">
  <div class="cell"><div class="box" style="border-radius:4px"></div><div class="name">radius-xs</div><div class="val">4px</div></div>
  <div class="cell"><div class="box" style="border-radius:6px"></div><div class="name">radius-sm</div><div class="val">6px · inputs</div></div>
  <div class="cell"><div class="box" style="border-radius:8px"></div><div class="name">radius-md ★</div><div class="val">8px · buttons/cards</div></div>
  <div class="cell"><div class="box" style="border-radius:12px"></div><div class="name">radius-lg</div><div class="val">12px · modales</div></div>
  <div class="cell"><div class="box" style="border-radius:9999px"></div><div class="name">radius-full</div><div class="val">avatars, dots</div></div>
</div>
<div style="margin-top:14px; font-size:11px; color:#78716C; line-height:1.6;">Échelle <b style="color:#1A2B48">sobre & pro</b>. <b>Pas</b> de 16–20px. La chaleur de la marque est portée par la couleur orange, pas par des coins excessifs.</div>
</body></html>
