<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:#FAFAF9; }
  .grid { display:grid; grid-template-columns: repeat(11, 1fr); gap:4px; max-width:652px; }
  .sw { aspect-ratio: 1/1.1; border-radius:6px; display:flex; flex-direction:column; justify-content:flex-end; padding:6px; font-family:'Inter',sans-serif; font-size:9px; font-weight:600; border:1px solid rgba(15,26,46,.05); }
  .sw .n { opacity:.75; font-weight:500; }
  .sw-wrap { position:relative; }
  .star { position:absolute; top:4px; right:6px; color:#1A2B48; font-size:11px; }
  .label { font-family:'Inter',sans-serif; font-size:12px; font-weight:600; color:#1A2B48; margin-bottom:10px; letter-spacing:.02em; }
</style></head>
<body>
<div class="label">ACCENT — Warm Orange</div>
<div class="grid">
  <div class="sw-wrap"><div class="sw" style="background:#FFF4ED; color:#7A3A15">50<div class="n">#FFF4ED</div></div></div>
  <div class="sw-wrap"><div class="sw" style="background:#FFE4D1; color:#7A3A15">100<div class="n">#FFE4D1</div></div></div>
  <div class="sw-wrap"><div class="sw" style="background:#FFCBA8; color:#7A3A15">200<div class="n">#FFCBA8</div></div></div>
  <div class="sw-wrap"><div class="sw" style="background:#FFB685; color:#7A3A15">300<div class="n">#FFB685</div></div></div>
  <div class="sw-wrap"><div class="sw" style="background:#F59763; color:#fff">400<div class="n">#F59763</div></div></div>
  <div class="sw-wrap"><span class="star">★</span><div class="sw" style="background:#EE7A3A; color:#fff">500<div class="n">#EE7A3A</div></div></div>
  <div class="sw-wrap"><div class="sw" style="background:#D9652D; color:#fff">600<div class="n">#D9652D</div></div></div>
  <div class="sw-wrap"><div class="sw" style="background:#C45C24; color:#fff">700<div class="n">#C45C24</div></div></div>
  <div class="sw-wrap"><div class="sw" style="background:#9C4718; color:#fff">800<div class="n">#9C4718</div></div></div>
  <div class="sw-wrap"><div class="sw" style="background:#7A3A15; color:#fff">900<div class="n">#7A3A15</div></div></div>
  <div class="sw-wrap"><div class="sw" style="background:#4D230C; color:#fff">950<div class="n">#4D230C</div></div></div>
</div>
</body></html>
