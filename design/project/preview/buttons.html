<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:#FAFAF9; font-family:Inter,sans-serif; }
  .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:14px; }
  .label { font-size:10px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:#78716C; margin-bottom:8px; }
  .btn { font-family:Inter; font-weight:600; font-size:14px; border-radius:8px; padding:0 16px; height:40px; display:inline-flex; align-items:center; gap:8px; border:0; cursor:pointer; transition:all 200ms cubic-bezier(.16,1,.3,1); }
  .btn-sm { height:32px; padding:0 12px; font-size:13px; }
  .btn-lg { height:48px; padding:0 24px; font-size:14px; }
  .primary { background:#EE7A3A; color:#fff; }
  .primary:hover { background:#D9652D; }
  .secondary { background:transparent; color:#1A2B48; border:1.5px solid #1A2B48; }
  .secondary:hover { background:#F0F4FA; }
  .ghost { background:transparent; color:#1A2B48; }
  .ghost:hover { background:#F5F5F4; }
  .destructive { background:#EF4444; color:#fff; }
  .destructive:hover { background:#B91C1C; }
  .link { background:transparent; color:#EE7A3A; padding:0; height:auto; text-decoration:none; }
  .link:hover { text-decoration:underline; text-underline-offset:4px; }
  .disabled { opacity:.5; cursor:not-allowed; }
</style></head>
<body>
<div class="label">Variants</div>
<div class="row">
  <button class="btn primary">Lancer la simulation</button>
  <button class="btn secondary">Voir le brief</button>
  <button class="btn ghost">Annuler</button>
  <button class="btn destructive">Supprimer</button>
  <button class="btn link">En savoir plus →</button>
</div>
<div class="label">Sizes</div>
<div class="row">
  <button class="btn primary btn-sm">Small · 32px</button>
  <button class="btn primary">Medium · 40px</button>
  <button class="btn primary btn-lg">Large · 48px</button>
</div>
<div class="label">States</div>
<div class="row">
  <button class="btn primary">Default</button>
  <button class="btn primary" style="background:#D9652D">Hover</button>
  <button class="btn primary" style="background:#C45C24">Active</button>
  <button class="btn primary" style="box-shadow:0 0 0 2px #EE7A3A, 0 0 0 4px #fff, 0 0 0 6px #EE7A3A">Focus</button>
  <button class="btn primary disabled">Disabled</button>
</div>
</body></html>
