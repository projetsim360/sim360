<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:#FAFAF9; font-family:Inter,sans-serif; }
  .grid { display:grid; grid-template-columns: repeat(3,1fr); gap:8px 10px; align-items:center; }
  .badge { display:inline-flex; align-items:center; gap:5px; font-size:12px; font-weight:600; padding:3px 9px; border-radius:4px; width:fit-content; }
  .dot { width:6px; height:6px; border-radius:99px; }
  .label { font-size:10px; color:#78716C; font-weight:600; letter-spacing:.3px; text-transform:uppercase; }
  .avatar { width:36px; height:36px; border-radius:99px; display:inline-flex; align-items:center; justify-content:center; font-weight:700; color:#fff; font-size:13px; }
  .group { display:flex; }
  .group .avatar { border:2px solid #FAFAF9; margin-left:-10px; }
  .group .avatar:first-child { margin-left:0; }
</style></head>
<body>
<div class="label" style="margin-bottom:8px">Status badges</div>
<div class="grid">
  <span class="badge" style="background:#ECFDF5;color:#047857"><span class="dot" style="background:#10B981"></span>Terminé</span>
  <span class="badge" style="background:#FFFBEB;color:#B45309"><span class="dot" style="background:#F59E0B"></span>En attente</span>
  <span class="badge" style="background:#FEF2F2;color:#B91C1C"><span class="dot" style="background:#EF4444"></span>Bloqué</span>
  <span class="badge" style="background:#F0F4FA;color:#1A2B48"><span class="dot" style="background:#3D5478"></span>Brouillon</span>
  <span class="badge" style="background:#FFE4D1;color:#9C4718"><span class="dot" style="background:#EE7A3A"></span>À démarrer</span>
  <span class="badge" style="background:#EFF6FF;color:#1D4ED8"><span class="dot" style="background:#3B82F6"></span>Info</span>
</div>

<div class="label" style="margin:20px 0 8px">Count / score pills</div>
<div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
  <span class="badge" style="background:#1A2B48;color:#fff;border-radius:99px;padding:2px 10px">3</span>
  <span class="badge" style="background:#EE7A3A;color:#fff;border-radius:99px;padding:2px 10px">12</span>
  <span class="badge" style="background:#FFF4ED;color:#9C4718;border-radius:99px;padding:3px 10px">+4 cette semaine</span>
  <span class="badge" style="background:#fff;border:1.5px solid #1A2B48;color:#1A2B48;border-radius:99px;padding:3px 10px">Senior</span>
</div>

<div class="label" style="margin:20px 0 8px">Avatars</div>
<div style="display:flex;gap:14px;align-items:center">
  <span class="avatar" style="background:#1A2B48">AM</span>
  <span class="avatar" style="background:#EE7A3A">LR</span>
  <span class="avatar" style="background:#3D5478">CK</span>
  <div class="group">
    <span class="avatar" style="background:#1A2B48">AM</span>
    <span class="avatar" style="background:#EE7A3A">LR</span>
    <span class="avatar" style="background:#3D5478">CK</span>
    <span class="avatar" style="background:#F5F5F4;color:#57534E">+5</span>
  </div>
</div>
</body></html>
