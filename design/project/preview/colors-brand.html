<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:#FAFAF9; }
  .grid { display:grid; grid-template-columns: repeat(11, 1fr); gap:4px; max-width:652px; }
  .sw { aspect-ratio: 1/1.1; border-radius:6px; display:flex; flex-direction:column; justify-content:flex-end; padding:6px; font-family:'Inter',sans-serif; font-size:9px; font-weight:600; border:1px solid rgba(15,26,46,.05); }
  .sw .n { opacity:.75; font-weight:500; }
  .star { position:absolute; top:4px; right:6px; color:#EE7A3A; font-size:11px; }
  .sw-wrap { position:relative; }
  .label { font-family:'Inter',sans-serif; font-size:12px; font-weight:600; color:#1A2B48; margin-bottom:10px; letter-spacing:.02em; }
</style></head>
<body>
<div class="label">BRAND — Deep Blue</div>
<div class="grid">
  <div class="sw-wrap"><div class="sw" style="background:#F0F4FA; color:#1A2B48">50<div class="n">#F0F4FA</div></div></div>
  <div class="sw-wrap"><div class="sw" style="background:#D6E0EF; color:#1A2B48">100<div class="n">#D6E0EF</div></div></div>
  <div class="sw-wrap"><div class="sw" style="background:#B8C7DF; color:#1A2B48">200<div class="n">#B8C7DF</div></div></div>
  <div class="sw-wrap"><div class="sw" style="background:#A8B9D4; color:#1A2B48">300<div class="n">#A8B9D4</div></div></div>
  <div class="sw-wrap"><div class="sw" style="background:#7E94BB; color:#fff">400<div class="n">#7E94BB</div></div></div>
  <div class="sw-wrap"><div class="sw" style="background:#5A7099; color:#fff">500<div class="n">#5A7099</div></div></div>
  <div class="sw-wrap"><div class="sw" style="background:#3D5478; color:#fff">600<div class="n">#3D5478</div></div></div>
  <div class="sw-wrap"><span class="star">★</span><div class="sw" style="background:#1A2B48; color:#fff">700<div class="n">#1A2B48</div></div></div>
  <div class="sw-wrap"><div class="sw" style="background:#14223A; color:#fff">800<div class="n">#14223A</div></div></div>
  <div class="sw-wrap"><div class="sw" style="background:#0F1A2E; color:#fff">900<div class="n">#0F1A2E</div></div></div>
  <div class="sw-wrap"><div class="sw" style="background:#08111F; color:#fff">950<div class="n">#08111F</div></div></div>
</div>
</body></html>
